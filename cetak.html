<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  :root { 
    --hijau-dinas: #0A3D0A; 
    --emas: #D4AF37;       
    --biru-navy: #0D1B2A;   
  }
  body { 
    margin: 0; 
    background: linear-gradient(135deg, var(--biru-navy) 0%, #1B263B 100%); 
    font-family: 'Segoe UI', 'Poppins', Arial, sans-serif; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { 
    text-align: center; 
    background: #fff; 
    padding: 40px 40px; 
    border-radius: 16px; 
    box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
    border-top: 8px solid var(--hijau-dinas);
    max-width: 550px;
  }
  /* KOP SURAT */
  .kop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 3px solid var(--hijau-dinas);
  }
  .kop img {
    width: 70px;
    height: 70px;
    object-fit: contain;
  }
  .kop-tengah h1 { 
    margin: 0; 
    color: var(--hijau-dinas); 
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .kop-tengah p {
    margin: 4px 0 0 0;
    color: #444;
    font-size: 13px;
    font-weight: 600;
  }
  .sub {
    color: #6c757d;
    font-size: 14px;
    margin-bottom: 30px;
  }
  button { 
    padding: 16px 32px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; 
    background: linear-gradient(90deg, var(--emas) 0%, #F2C464 100%);
    color: var(--biru-navy); 
    font-weight: 800;
    box-shadow: 0 5px 15px rgba(212,175,55,0.4);
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid var(--emas);
  }
  button:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 8px 20px rgba(212,175,55,0.6);
  }
  .info { 
    color: #6c757d; 
    font-size: 12px; 
    margin-top: 20px; 
    font-weight: 600;
    background: #f8f9fa;
    padding: 10px;
    border-radius: 6px;
    border-left: 4px solid var(--hijau-dinas);
  }
</style>
</head>
<body>
<div class="wrap">
  
  <!-- BAGIAN KOP SURAT -->
  <div class="kop">
    <!-- GANTI LINK LOGO KAN KIRI DI SINI -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Coat_of_arms_of_Indonesia_-_Garuda_Pancasila.svg/512px-Coat_of_arms_of_Indonesia_-_Garuda_Pancasila.svg.png" alt="Logo Garuda">
    
    <div class="kop-tengah">
      <h1>LAPORAN REALISASI BOSP</h1>
      <p>SMAS NASIONAL SARIPUTRA</p>
      <p>KOTA JAMBI</p>
    </div>

    <!-- KALO ADA LOGO SEKOLAH TARUH SINI. KALO GAK ADA, KOSONGIN SRC NYA -->
    <img src="https://i.imgur.com/placeholder.png" alt="Logo Sekolah"> 
  </div>

  <p class="sub">TAHUN ANGGARAN 2026 | BULAN JANUARI</p>
  
  <!-- LINK PDF 1 HALAMAN PAS -->
  <a href="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2&printtitle=false&gridlines=false&fzr=false&AT_RP=min" target="_blank">
    <button>🖨️ CETAK PDF LEGAL</button>
  </a>
  
  <div class="info">
    ✅ Ukuran Legal 8.5x14 | ✅ Fit to Width | ✅ 1 Halaman
  </div>
</div>
</body>
</html>
