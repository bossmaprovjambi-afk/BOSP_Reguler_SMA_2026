<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mencetak Laporan...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #525659; }
    #pdf-frame { width: 100%; height: 100%; border: none; }

    /* BAR ATAS NGUMPET - ANIMASI MACHO */
    #topbar {
      position: fixed;
      top: -60px; /* Sembunyiin dulu */
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(15, 23, 42, 0.9); /* Slate 900 transparan */
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      transition: top 0.4s ease-in-out; /* Animasi turun */
      z-index: 100;
    }
    body:hover #topbar {
      top: 0; /* Muncul pas hover */
    }

    /* HILANGIN BAR PAS PRINT */
    @media print {
      #topbar { display: none!important; }
      body { background-color: white; }
    }

    /* ANIMASI LOAD PDF */
    #pdf-frame {
      opacity: 0;
      transform: scale(0.98) translateY(20px);
      animation: fadeInUp 0.8s ease-out forwards;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- BAR NGUMPET DI ATAS -->
  <div id="topbar">
    <h1 id="judulCetak" class="text-lg font-bold">Loading...</h1>
    <div class="flex gap-3">
      <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg font-semibold text-sm">🖨️ Print</button>
      <button onclick="window.close()" class="bg-slate-600 hover:bg-slate-700 px-5 py-2 rounded-lg font-semibold text-sm">✖ Tutup</button>
    </div>
  </div>

  <!-- PDF FULL SCREEN -->
  <iframe id="pdf-frame" src=""></iframe>

<script>
  // AMBIL GID DARI URL?gid=xxx
  const params = new URLSearchParams(window.location.search);
  const gid = params.get('gid');
  const namaBulan = params.get('bulan') || 'BKU';

  // ID FILE GSheet LU
  const FILE_ID = '1eqNg_aSXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk';

  // RUMUS LINK PDF AUTO DARI GSheet
  const pdfUrl = `https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=pdf&gid=${gid}&portrait=true&fitw=true&top_margin=0.2&bottom_margin=0.2&left_margin=0.2&right_margin=0.2&sheetnames=false&printtitle=false&gridlines=false`;

  if(gid) {
    document.getElementById('pdf-frame').src = pdfUrl;
    document.getElementById('judulCetak').innerText = `LAPORAN BKU ${namaBulan.toUpperCase()} 2026`;
    document.title = `LAPORAN BKU ${namaBulan.toUpperCase()} 2026`;
  } else {
    document.body.innerHTML = `<div class="flex h-screen items-center justify-center text-white text-2xl">Error: GID tidak ditemukan</div>`;
  }
</script>

</body>
</html>
