<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
  .container { max-width: 1200px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px #ccc; }
  h1 { text-align: center; }
  .btn-wrap { text-align: center; margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; }
  button { 
    padding: 12px 20px; 
    font-size: 16px; 
    cursor: pointer; 
    border: none; 
    border-radius: 6px; 
    color: #fff; 
    font-weight: bold;
  }
  #btn-jan { background: #28a745; } /* Hijau = Lihat */
  #btn-print { background: #007bff; } /* Biru = Print */
  #btn-print:disabled { background: #aaa; cursor: not-allowed; }
  iframe { width: 100%; height: 85vh; border: 1px solid #ddd; }
  .info { text-align: center; color: #666; font-size: 14px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>LAPORAN BKU JANUARI 2026</h1>
  
  <div class="btn-wrap">
    <button id="btn-jan">1. Lihat Januari</button>
    <button id="btn-print" disabled>2. Print Legal PDF</button>
  </div>

  <iframe id="viewer" src="about:blank"></iframe>
  <p class="info">Tip: Kalo mau hasil paling bagus, pake tombol `Print Legal PDF` jangan `Ctrl+P`</p>
</div>

<script>
  // === GANTI PUNYA LU DISINI ===
  const PUB_ID = '2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc';
  const gidJan = '102046414'; // GID Sheet Lap.JAN26
  
  // Link PDF Mentah dari Google. INI YANG LEGAL
  const pdfLinkAsli = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?gid=${gidJan}&single=true&output=pdf`;
  
  // Link buat Preview di Iframe
  const pdfUrlViewer = `https://docs.google.com/viewer?embedded=true&url=${encodeURIComponent(pdfLinkAsli)}`;

  const btnJan = document.getElementById('btn-jan');
  const btnPrint = document.getElementById('btn-print');
  const viewer = document.getElementById('viewer');

  // TOMBOL 1: CUMA BUAT LIHAT PREVIEW
  btnJan.addEventListener('click', () => {
    viewer.src = pdfUrlViewer;
    btnPrint.disabled = false; // Aktifin tombol print
  });

  // TOMBOL 2: LANGSUNG PRINT PDF ASLI BIAR GAK BLANK
  btnPrint.addEventListener('click', () => {
    // Buka PDF Legal di tab baru
    const win = window.open(pdfLinkAsli, '_blank');
    if(win) {
        // Kasih jeda 1.5 detik biar PDF ke-load, baru auto print
        setTimeout(() => { 
            win.print(); 
        }, 1500);
    } else {
        alert('Pop-up diblokir lur. Izinkan pop-up dulu ya.');
    }
  });

</script>
</body>
</html>
