<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan BOSP</title>
<style>
  :root {
    --hijau-dinas: #0A3D0A;
    --emas: #D4AF37;
    --emas-gelap: #B8860B;
    --biru-navy: #00182A;
  }
  body {
    margin: 0;
    background: linear-gradient(135deg, var(--biru-navy) 0%, #18263B 100%);
    font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
    padding: 20px;
  }
  .wrap {
    background: #fff;
    padding: 35px 40px;
    border-radius: 16px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.4);
    border-top: 8px solid var(--hijau-dinas);
    max-width: 900px;
    margin: auto;
  }
  header {
    display:flex; 
    align-items:center; 
    gap:20px; 
    margin-bottom:20px;
  }
  header img { height:90px; }
  header h2 { margin:0; color:var(--biru-navy); font-size:18px; }
  header h3 { margin:0; color:var(--hijau-dinas); font-size:16px; }
  header p { margin:0; font-size:14px; color:#333; }
  hr { border:none; border-top:3px solid var(--hijau-dinas); margin:10px 0 20px; }

  .btn-cetak {
    background:var(--hijau-dinas); 
    color:#fff; 
    border:none; 
    padding:12px 24px; 
    border-radius:10px; 
    font-weight:bold; 
    font-size:15px;
    box-shadow:0 4px 0 var(--emas-gelap); 
    cursor:pointer; 
    margin:20px 0;
    transition:0.1s;
  }
  .btn-cetak:active {
    box-shadow:0 2px 0 var(--emas-gelap);
    transform:translateY(2px);
  }

  table { width:100%; border-collapse: collapse; margin-top:15px; font-size:12px; }
  table th, table td { border:1px solid #ccc; padding:8px; text-align:center; }
  table th { background:var(--hijau-dinas); color:#fff; }

  @media print {
    body { background:#fff; padding:0; }
    .wrap { box-shadow:none; border-top:none; border-radius:0; max-width:100%; padding:20px; }
    .btn-cetak { display:none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    
    <header>
      <img src="logo-jambi.png" alt="Logo Provinsi Jambi">
      <div>
        <h2>PEMERINTAH PROVINSI JAMBI</h2>
        <h3>DINAS PENDIDIKAN</h3>
        <p>LAPORAN REALISASI BOSP SMA TAHUN 2026</p>
      </div>
    </header>
    <hr>

    <button class="btn-cetak" onclick="window.print()">🖨️ CETAK LAPORAN</button>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Kode Rek</th>
          <th>Uraian</th>
          <th>Anggaran</th>
          <th>Realisasi</th>
          <th>Sisa</th>
        </tr>
      </thead>
      <tbody id="isiTabel">
        <tr><td colspan="6">Data akan diisi otomatis dari Excel</td></tr>
      </tbody>
    </table>

  </div>
</body>
</html>
