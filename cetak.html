<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetak Laporan Bulan - Dinas Jambi</title>
<style>
  :root{
    --navy:#00182A;
    --gold:#C6A942;
    --blue-active:#EFF6FF;
    --blue-line:#2563EB;
    --text:#334155;
    --text-muted:#64748B;
    --bg:#F8FAFC;
    --input-bg:#F1F5F9;
  }
  *{box-sizing:border-box}
  body{
    margin:0; 
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    min-height:100vh;
  }

  /* ===== SIDEBAR PUTIH BERSIH ===== */
  .sidebar{
    width:260px;
    background:#FFFFFF;
    border-right:1px solid #E2E8F0;
    padding:20px 0;
    display:flex;
    flex-direction:column;
  }
  .sidebar-head{
    text-align:center;
    padding:0 20px 20px;
    border-bottom:1px solid #F1F5F9;
    margin-bottom:10px;
  }
  .sidebar-head img{
    width:80px; height:auto; margin-bottom:12px;
  }
  .sidebar-head h2{
    font-size:16px; font-weight:700; 
    color:var(--navy); margin:0; line-height:1.3;
  }
  .sidebar-head p{
    font-size:12px; color:var(--text-muted); 
    margin:4px 0 0;
  }
  .menu{
    list-style:none; padding:0; margin:0;
  }
  .menu li a{
    display:flex; align-items:center; gap:12px;
    padding:12px 20px;
    color:var(--text); text-decoration:none;
    font-size:14px; font-weight:500;
    border-left:4px solid transparent;
    transition:.2s;
  }
  .menu li a:hover{background:#F8FAFC;}
  .menu li a.active{
    background:var(--blue-active);
    border-left:4px solid var(--blue-line);
    color:var(--navy); font-weight:700;
  }
  .menu svg{width:20px; height:20px; flex-shrink:0;}

  /* ===== KONTEN KAN ===== */
  .main{
    flex:1; padding:32px;
  }
  .card{
    background:#FFF; border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,.06);
    padding:28px; max-width:600px; margin:0 auto;
    border-top:4px solid var(--gold);
  }
  .card h1{
    font-size:22px; color:var(--navy); margin:0 0 4px;
    border-bottom:1px solid #E2E8F0; padding-bottom:12px;
  }
  .card h2{font-size:18px; color:var(--text); margin:16px 0 20px; font-weight:600;}

  /* ===== FORM ===== */
  .form-group{margin-bottom:16px;}
  label{font-size:13px; font-weight:600; color:var(--text-muted); display:block; margin-bottom:6px;}
  input[type=text], select{
    width:100%; padding:12px; border:1px solid #CBD5E1; 
    border-radius:8px; font-size:14px; background:var(--input-bg);
  }
  input:focus, select:focus{outline:none; border-color:var(--blue-line); box-shadow:0 0 0 3px rgba(37,99,235,.1);}

  /* ===== TOMBOL 3D HIJAU DINAS ===== */
  .btn{
    width:100%;
    padding:14px 24px; border:none; border-radius:8px;
    font-size:15px; font-weight:700; cursor:pointer;
    transition: all .1s ease;
    box-shadow: 0 4px 0 #0A3D0A;
    background:#0A3D0A; color:#FFF;
    margin-top:10px;
  }
  .btn:hover{background:#0F4F0F; transform:translateY(2px); box-shadow: 0 2px 0 #0A3D0A;}
  .btn:active{transform:translateY(4px); box-shadow: 0 0 0 #0A3D0A;}
  .btn:disabled{background:#94A3B8; box-shadow: 0 4px 0 #64748B; cursor:not-allowed;}

  @media print{.sidebar{display:none} .main{padding:0}}
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-head">
      <img src="logo-jambi.png" alt="Logo Jambi">
      <h2>DINAS PENDIDIKAN<br>PROVINSI JAMBI</h2>
      <p>Bidang Pembinaan SMA</p>
    </div>
    <ul class="menu">
      <li><a href="#" class="active">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
        Cetak Laporan Bulan
      </a></li>
      <li><a href="#">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Dashboard Utama
      </a></li>
    </ul>
  </aside>

  <main class="main">
    <div class="card">
      <h1>Cetak Laporan Bulan</h1>
      <h2>Dashboard Utama</h2>
      
      <div class="form-group">
        <label for="npsn">Masukkan NPSN Sekolah</label>
        <input type="text" id="npsn" placeholder="Contoh: 10504558">
      </div>

      <div class="form-group">
        <label for="bulan">Pilih Bulan Cetak</label>
        <select id="bulan">
          <option value="">-- Pilih Bulan --</option>
          <option value="JAN26">Januari 2026</option>
          <option value="FEB26">Februari 2026</option>
          <option value="MAR26">Maret 2026</option>
          <option value="APR26">April 2026</option>
          <option value="MEI26">Mei 2026</option>
          <option value="JUN26">Juni 2026</option>
          <option value="JUL26">Juli 2026</option>
          <option value="AGT26">Agustus 2026</option>
          <option value="SEP26">September 2026</option>
          <option value="OKT26">Oktober 2026</option>
          <option value="NOV26">November 2026</option>
          <option value="DES26">Desember 2026</option>
        </select>
      </div>
      
      <button class="btn" onclick="cekDanCetak()">CETAK LAPORAN</button>
    </div>
  </main>

<script>
function cekDanCetak(){
  const npsn = document.getElementById('npsn').value;
  const bulan = document.getElementById('bulan').value;
  
  if(!npsn || !bulan){
    alert('NPSN dan Bulan wajib diisi lur!');
    return;
  }
  
  // Nanti diisi: Cek NPSN ke CSV Data Masuk
  // Kalo ada, baru window.print()
  alert(`Nanti cetak NPSN: ${npsn} Bulan: ${bulan}`);
}
</script>

</body>
</html>
