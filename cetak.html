<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Laporan BOSP</title>
<style>
  :root { --hijau: #28a745; --merah: #dc3545; --biru: #007bff; --abu: #f4f6f9; }
  body { margin: 0; background: var(--abu); font-family: 'Segoe UI', Arial, sans-serif; }
  .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); overflow: hidden; }
  .header { padding: 20px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
  .header h1 { margin: 0; font-size: 20px; color: #343a40; }
  .btn-group { display: flex; gap: 10px; }
  button { 
    padding: 10px 18px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px; 
    color: #fff; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  .btn-print { background: var(--hijau); }
  .btn-close { background: var(--merah); }
  .btn-tab { background: var(--biru); }

  .tabs { display: flex; border-bottom: 1px solid #dee2e6; background: #fafafa; }
  .tab-btn { 
    flex: 1; padding: 14px; border: none; background: transparent; cursor: pointer; 
    font-size: 15px; font-weight: 600; color: #6c757d; border-bottom: 3px solid transparent;
  }
  .tab-btn.active { color: var(--biru); border-bottom: 3px solid var(--biru); background: #fff; }
  
  .tab-content { display: none; height: 80vh; }
  .tab-content.active { display: block; }
  iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>📊 LAPORAN BKU JANUARI 2026</h1>
      <div class="btn-group">
        <button class="btn-print" onclick="window.print()">🖨️ PRINT PDF</button>
        <button class="btn-close" onclick="window.close()">❌ TUTUP</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="openTab(event, 'excel')">📑 Tampilan Excel</button>
      <button class="tab-btn" onclick="openTab(event, 'pdf')">📄 Preview PDF Legal</button>
    </div>

    <!-- TAB 1: EXCEL LANGSUNG -->
    <div id="excel" class="tab-content active">
      <iframe src="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/edit?gid=102046414&rm=minimal"></iframe>
    </div>

    <!-- TAB 2: PDF LEGAL -->
    <div id="pdf" class="tab-content">
      <iframe src="https://docs.google.com/spreadsheets/d/1eqNg_asXE8QFR1_HKELJUDtKZkzejonaVozv6XbS4mk/export?format=pdf&gid=102046414&size=Legal&portrait=true&scale=2&top_margin=0.25&bottom_margin=0.25&left_margin=0.25&right_margin=0.25&printtitle=false&gridlines=false&fzr=false#toolbar=0&navpanes=0&zoom=FitH"></iframe>
    </div>
  </div>
</div>

<script>
function openTab(evt, tabName) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabName).classList.add('active');
  evt.currentTarget.classList.add('active');
}
</script>
</body>
</html>
