<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BOSP Jambi 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
.card { background-color: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); padding: 1.5rem; }
  th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
.status-sudah { background-color: #d1fae5; color: #065f46; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
.status-belum { background-color: #fee2e2; color: #991b1b; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 9999px; }
.row-clickable:hover { background-color: #eff6ff; cursor: pointer; }
.row-active { background-color: #dbeafe!important; } /* Baris yang dipilih jadi biru */
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-center mb-8">
    <div><h1 class="text-3xl font-bold text-gray-800">Dashboard BOSP Jambi 2026</h1><p class="text-gray-500">Monitoring Laporan Real-Time</p></div>
    <button id="refreshBtn" class="mt-4 md:mt-0 bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg shadow-md hover:bg-blue-700 transition">Refresh Data</button>
  </header>

  <div id="loader" class="text-center p-10"><p class="text-lg text-gray-600">Memuat data...</p></div>

  <div id="dashboard" class="hidden">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="card"><p class="text-gray-500">Total Sekolah</p><p id="totalSekolah" class="text-4xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-500">Sudah Kirim</p><p id="sudahKirim" class="text-4xl font-bold text-green-600">0</p></div>
      <div class="card"><p class="text-gray-500">Belum Kirim</p><p id="belumKirim" class="text-4xl font-bold text-red-600">0</p></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="card lg:col-span-1"><h3 class="font-bold text-lg mb-4">Progres Laporan</h3><canvas id="statusChart"></canvas></div>
      
      <div class="card lg:col-span-2">
        <h3 class="font-bold text-lg mb-4">Data Sekolah - Klik untuk lihat detail</h3>
        <input type="text" id="searchInput" placeholder="Cari Nama Sekolah / NPSN..." class="w-full p-2 border rounded-lg mb-4">
        <div class="overflow-x-auto max-h-80"><table class="w-full text-sm"><thead class="bg-gray-50 sticky top-0"><tr><th>NPSN</th><th>Nama Sekolah</th><th>Kab/Kota</th><th>Status</th></tr></thead><tbody id="dataTable"></tbody></table></div>
      </div>
    </div>

    <!-- INI KARTU DETAIL VERTIKAL NYA LUR -->
    <div id="detailCard" class="card mt-6 hidden">
      <h3 id="detailTitle" class="text-xl font-bold mb-4 text-gray-800"></h3>
      <div id="detailBody" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3"></div>
    </div>

  </div>
</div>

<script>
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTNn0ZAz-vXzFtyT2PTWH05V-RjZtHI4AK3VfOhqOc0bAxo2X_kp21i96tBBjMs04_XWs_0-Sa_nCSc/pub?output=csv';
  
  let allData = [];
  let statusChart;
  let headers = [];

  async function fetchData() {
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    try {
      const response = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime());
      const csvText = await response.text();
      const lines = csvText.split('\n');
      headers = lines.shift().split(',').map(h => h.trim().replace(/"/g, ''));

      allData = lines.map(line => {
        const cols = line.split(',').map(c => c.trim().replace(/"/g, ''));
        let obj = {};
        headers.forEach((h, i) => obj[h] = cols[i] || '');
        return obj;
      }).filter(r => r[headers[0]]);

      updateDashboard();
    } catch (error) {
      document.getElementById('loader').innerHTML = `<p class="text-red-600 font-bold">Gagal memuat data. Cek Google Sheet udah 'Siapa saja dengan link' belum lur?</p>`;
    } finally {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }
  }

  function updateDashboard() {
    const statusCol = headers.find(h => h.toLowerCase().includes('status'));
    const sudah = allData.filter(d => d[statusCol]?.toUpperCase() === 'SAMA').length;
    const belum = allData.filter(d => d[statusCol]?.toUpperCase() === 'BELUM SAMA').length;
    const total = allData.length;

    document.getElementById('totalSekolah').innerText = total;
    document.getElementById('sudahKirim').innerText = sudah;
    document.getElementById('belumKirim').innerText = belum;

    renderTable(allData);
    renderChart(sudah, belum);
  }

  function renderTable(data) {
    const npsnCol = headers.find(h => h.toLowerCase().includes('npsn'));
    const namaCol = headers.find(h => h.toLowerCase().includes('nama'));
    const kabCol = headers.find(h => h.toLowerCase().includes('kab') || h.toLowerCase().includes('kota'));
    const statusCol = headers.find(h => h.toLowerCase().includes('status'));

    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = data.map(d => `
      <tr id="row-${d[npsnCol]}" class="row-clickable" onclick="showDetail('${d[npsnCol]}')">
        <td>${d[npsnCol]}</td>
        <td>${d[namaCol]}</td>
        <td>${d[kabCol]}</td>
        <td><span class="${d[statusCol]?.toUpperCase() === 'SAMA'? 'status-sudah' : 'status-belum'}">${d[statusCol]}</span></td>
      </tr>
    `).join('');
  }
  
  function renderChart(sudah, belum) {
    const ctx = document.getElementById('statusChart').getContext('2d');
    if(statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Sudah Kirim', 'Belum Kirim'], datasets: [{ data: [sudah, belum], backgroundColor: ['#10B981', '#EF4444'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } });
  }

  // FUNGSI KARTU VERTIKAL
  function showDetail(npsn) {
    // 1. Hapus highlight biru dari semua baris
    document.querySelectorAll('#dataTable tr').forEach(tr => tr.classList.remove('row-active'));
    // 2. Kasih highlight biru ke baris yang diklik
    document.getElementById(`row-${npsn}`).classList.add('row-active');

    const npsnCol = headers.find(h => h.toLowerCase().includes('npsn'));
    const namaCol = headers.find(h => h.toLowerCase().includes('nama'));
    const data = allData.find(d => d[npsnCol] === npsn);
    if (!data) return;

    document.getElementById('detailTitle').innerText = `Detail: ${data[namaCol]}`;
    
    let bodyHTML = '';
    headers.forEach(key => { // Loop semua kolom jadi vertikal
      if (data[key]) {
        bodyHTML += `
          <div class="border-b pb-2">
            <p class="text-sm text-gray-500 font-medium capitalize">${key}</p>
            <p class="text-gray-800 font-semibold">${data[key]}</p>
          </div>
        `;
      }
    });
    document.getElementById('detailBody').innerHTML = bodyHTML;
    document.getElementById('detailCard').classList.remove('hidden'); // Munculin kartunya
    document.getElementById('detailCard').scrollIntoView({ behavior: 'smooth' }); // Auto scroll ke bawah
  }

  document.getElementById('refreshBtn').addEventListener('click', fetchData);
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const search = e.target.value.toLowerCase();
    const npsnCol = headers.find(h => h.toLowerCase().includes('npsn'));
    const namaCol = headers.find(h => h.toLowerCase().includes('nama'));
    const filtered = allData.filter(d => d[namaCol].toLowerCase().includes(search) || d[npsnCol].includes(search));
    renderTable(filtered);
    document.getElementById('detailCard').classList.add('hidden'); // Sembunyiin detail kalo lagi nyari
  });

  fetchData();
</script>
</body>
</html>
