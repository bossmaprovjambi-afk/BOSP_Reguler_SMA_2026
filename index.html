<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BOSP SMA Jambi 2026</title>
<style>
  :root{--navy:#0A2947;--hijau:#10b981;--merah:#ef4444;--biru:#3b82f6;--orange:#f97316;--bg:#f4f7f9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;}
  [data-theme=dark]{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--border:#334155;--navy:#3b82f6}
  *{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
  body{display:flex;min-height:100vh;background:var(--bg);color:var(--text)}
 .sidebar{width:260px;background:var(--card);border-right:1px solid var(--border);padding:24px 20px;height:100vh;position:sticky;top:0}
 .sidebar.logo{text-align:center;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:12px}
 .sidebar.logo img{width:56px;height:56px;border-radius:12px}
 .sidebar.logo h2{font-size:15px;font-weight:700}
 .menu{list-style:none;display:flex;flex-direction:column;gap:4px}
 .menu a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;text-decoration:none;color:var(--muted);font-weight:600}
 .menu a.active{background:var(--navy);color:#fff}
 .main{flex:1;padding:28px;overflow-y:auto}
 .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
 .theme-toggle{width:52px;height:28px;background:var(--border);border-radius:20px;position:relative;border:none;cursor:pointer}
 .theme-toggle span{position:absolute;top:4px;left:4px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left.3s}
  [data-theme=dark].theme-toggle span{left:28px}
 .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px}
 .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:20px 0}
 .stat-card{border:1px solid var(--border);border-radius:16px;padding:20px;background:var(--card)}
 .stat-card.angka{font-size:32px;font-weight:800}
 .filter-bar{margin-bottom:16px}
 .search-box{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--border);padding:14px 10px;text-align:center;font-weight:700;font-size:11px}
  td{border-bottom:1px solid var(--border);padding:12px 8px;text-align:center}
  td.kiri{text-align:left}
 .ok{color:var(--hijau);font-weight:800;font-size:18px}
 .kosong{color:var(--border);font-size:18px}
 .status-badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
 .status-negeri{background:var(--hijau)}
 .status-swasta{background:var(--orange)}
 .wa-badge{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--navy);color:#fff}
 .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;background:var(--card)}
 .badge{background:var(--navy);color:#fff;padding:5px 12px;border-radius:8px;font-size:13px;font-weight:700}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <img src="https://i.ibb.co.com/ppSq2Ly/logo-jambi.png" alt="Logo">
      <div><h2>Dinas Pendidikan<br>Provinsi Jambi</h2><p>Bidang Pembinaan SMA</p></div>
    </div>
    <ul class="menu">
      <li><a href="#" class="active">📊 Status Kirim</a></li>
      <li><a href="#">📄 Laporan BKU</a></li>
    </ul>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>Dashboard BOSP 2026</h1>
      <button class="theme-toggle" id="themeBtn"><span></span></button>
    </div>
    <div class="card">
      <h3>📊 Status Kirim Laporan BOSP SMA 2026 <span class="badge" id="totalSekolah">0</span></h3>
      <div class="stats-grid">
        <div class="stat-card"><div>Total Sekolah</div><div class="angka" id="statTotal">0</div></div>
        <div class="stat-card"><div>Sudah Kirim</div><div class="angka" id="statSudah">0</div></div>
        <div class="stat-card"><div>Belum Kirim</div><div class="angka" id="statBelum">0</div></div>
        <div class="stat-card"><div>Progress</div><div class="angka" id="statPersen">0%</div></div>
      </div>
      <div class="filter-bar">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Cari NPSN, Nama Sekolah, atau Kabupaten...">
      </div>
      <div class="table-wrap">
        <table id="tabelStatus">
          <thead><tr><th>No</th><th class="kiri">NPSN</th><th class="kiri">Nama Sekolah</th><th>Status</th><th class="kiri">Kabupaten</th><th>J</th><th>F</th><th>M</th><th>A</th><th>M</th><th>J</th><th>J</th><th>A</th><th>S</th><th>O</th><th>N</th><th>D</th><th>WA</th></tr></thead>
          <tbody><tr><td colspan="18">⏳ Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
<script>
const CSV_URL="https://script.google.com/macros/s/AKfycbwMxmNRScZrparzArqIHwDS1GOJ08PoqbqmNgFdEU1L_A_ycR7HIGUA7Ics2BUjIGcD3w/exec";
let dataSekolah=[],dataFiltered=[];

document.getElementById('themeBtn').onclick=()=>{
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
}
document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');

const clean=s=>String(s||'').toLowerCase().replace(/[^a-z]/g,'').trim();

async function loadData(){
  try{
    const res=await fetch(CSV_URL+'?t='+Date.now());
    const data=await res.json();
    const h=data[0].map(clean);
    const iNo=h.indexOf('no'),iNPSN=h.indexOf('npsn'),iNama=h.indexOf('namasekolah'),
          iStatus=h.indexOf('status'),iKab=h.indexOf('kabupaten')>-1?h.indexOf('kabupaten'):h.indexOf('kabkota'),
          iWa=h.indexOf('statuskirim'),
          b={jan:h.indexOf('januari'),feb:h.indexOf('februari'),mar:h.indexOf('maret'),apr:h.indexOf('april'),
             mei:h.indexOf('mei'),jun:h.indexOf('juni'),jul:h.indexOf('juli'),agt:h.indexOf('agustus'),
             sep:h.indexOf('september'),okt:h.indexOf('oktober'),nov:h.indexOf('nopember'),des:h.indexOf('desember')};

    dataSekolah=data.slice(1).filter(r=>r[iNPSN]).map(r=>({
      no:r[iNo]?.toString().trim()||'',
      npsn:r[iNPSN]?.toString().trim()||'-',
      nama:r[iNama]?.toString().trim()||'-',
      status:r[iStatus]?.toString().trim()||'',
      kab:iKab>-1?r[iKab].toString().trim():'-',
      wa:r[iWa]?.toString().trim()||'-',
      jan:b.jan>-1?r[b.jan].toString().trim():'',feb:b.feb>-1?r[b.feb].toString().trim():'',
      mar:b.mar>-1?r[b.mar].toString().trim():'',apr:b.apr>-1?r[b.apr].toString().trim():'',
      mei:b.mei>-1?r[b.mei].toString().trim():'',jun:b.jun>-1?r[b.jun].toString().trim():'',
      jul:b.jul>-1?r[b.jul].toString().trim():'',agt:b.agt>-1?r[b.agt].toString().trim():'',
      sep:b.sep>-1?r[b.sep].toString().trim():'',okt:b.okt>-1?r[b.okt].toString().trim():'',
      nov:b.nov>-1?r[b.nov].toString().trim():'',des:b.des>-1?r[b.des].toString().trim():''
    }));
    dataFiltered=[...dataSekolah];
    renderTabel();

    document.getElementById('searchInput').oninput=e=>{
      const q=e.target.value.toLowerCase().trim();
      dataFiltered=q===''? [...dataSekolah] : dataSekolah.filter(s=>s.npsn.includes(q)||s.nama.toLowerCase().includes(q)||s.kab.toLowerCase().includes(q));
      renderTabel();
    }
  }catch(e){
    document.querySelector('#tabelStatus tbody').innerHTML=`<tr><td colspan="18" style="color:red">❌ Error: ${e.message}</td></tr>`
  }
}

function renderTabel(){
  const total=dataSekolah.length;
  const sudah=dataSekolah.filter(s=>['jan','feb','mar','apr','mei','jun','jul','agt','sep','okt','nov','des'].every(m=>s[m]&&s[m]!=='BELUM KIRIM')).length;
  const belum=total-sudah;const persen=total>0?((sudah/total)*100).toFixed(1):0;
  document.getElementById('totalSekolah').textContent=total;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statSudah').textContent=sudah;
  document.getElementById('statBelum').textContent=belum;
  document.getElementById('statPersen').textContent=persen+'%';
  
  document.querySelector('#tabelStatus tbody').innerHTML=dataFiltered.map(s=>`
    <tr>
      <td>${s.no}</td>
      <td class="kiri">${s.npsn}</td>
      <td class="kiri" title="${s.nama}">${s.nama}</td>
      <td><span class="status-badge ${s.status.toLowerCase().includes('negeri')?'status-negeri':'status-swasta'}">${s.status||'-'}</span></td>
      <td class="kiri">${s.kab}</td>
      ${['jan','feb','mar','apr','mei','jun','jul','agt','sep','okt','nov','des'].map(m=>`<td>${s[m]&&s[m]!=='BELUM KIRIM'?'<span class="ok">✓</span>':'<span class="kosong">○</span>'}</td>`).join('')}
      <td><span class="wa-badge">⚠️ ${s.wa}</span></td>
    </tr>
  `).join('');
}
loadData();
</script>
</body>
</html>
